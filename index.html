<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Player Showdown</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>The G.O.A.T 🐐</h1>
  </header>

  <nav>
    <a href="#" onclick="switchTab('player-showdown')" class="active">Player Showdown</a>
    <a href="#" onclick="switchTab('elo-rankings')">ELO Rankings</a>
  </nav>

  <div class="container">
    <div id="player-showdown" class="tab-content active">
      <div id="game-mode-toggle">
        <button id="toggle-game-mode" class="toggle-button active">Disable Winner Stays</button>
        <div class="top-n-group">
          <button class="top-n-btn active" onclick="setTopN(null)">All</button>
          <button class="top-n-btn" onclick="setTopN(100)">Top 100</button>
          <button class="top-n-btn" onclick="setTopN(50)">Top 50</button>
          <button class="top-n-btn" onclick="setTopN(25)">Top 25</button>
          <button class="top-n-btn" onclick="setTopN(10)">Top 10</button>
        </div>
      </div>

      <div id="players-row"></div>

      <div id="toggle-buttons-wrapper"></div>
    </div>

    <div id="elo-rankings" class="tab-content">
      <h2>ELO Rankings</h2>
      <input type="text" id="search-bar" placeholder="Search for a player..." oninput="filterRankings()" />
      <div id="rankings-list"></div>
    </div>

  </div>

  <div id="hover-card-container" class="hover-card-popup"></div>

  <script src="script.js"></script>
</body>
</html>
